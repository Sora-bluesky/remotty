[service]
run_mode = "console"
poll_timeout_sec = 30
shutdown_grace_sec = 15

[telegram]
token_secret_ref = "remotty-telegram-bot"
allowed_chat_types = ["private"]
# Leave empty when you pair senders with the access-pair command.
admin_sender_ids = []

[codex]
binary = "codex"
sandbox = "workspace-write"
approval = "on-request"
transport = "app_server"

[storage]
db_path = "state/bridge.db"
state_dir = "state"
temp_dir = "state/tmp"
log_dir = "state/logs"

[policy]
default_mode = "await_reply"
progress_edit_interval_ms = 5000
max_output_chars = 12000
max_turns_limit = 3

[[workspaces]]
id = "main"
path = "C:/path/to/workspace"
writable_roots = [
  "C:/path/to/workspace"
]
default_mode = "await_reply"
continue_prompt = "Continue with the needed checks. If you must stop, reply with the short reason."
checks_profile = "default"
