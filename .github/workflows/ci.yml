name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Build check
        run: cargo check

      - name: Test
        run: cargo test

      - name: Setup planning validation files
        shell: pwsh
        run: |
          $planningRoot = Join-Path $env:RUNNER_TEMP 'remotty-planning'
          $markerPath = Join-Path $env:RUNNER_TEMP 'remotty-planning-root.txt'
          "REMOTTY_PLANNING_ROOT=$planningRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REMOTTY_PLANNING_ROOT_MARKER=$markerPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          pwsh -NoProfile -File scripts/setup-planning.ps1 -PlanningRoot $planningRoot -MarkerPath $markerPath

      - name: Planning validation
        run: pwsh -NoProfile -File scripts/validate-planning.ps1

      - name: Public surface audit
        run: pwsh -NoProfile -File scripts/audit-public-surface.ps1

      - name: Documentation terminology audit
        run: pwsh -NoProfile -File scripts/audit-doc-terminology.ps1

      - name: Secret surface audit
        run: pwsh -NoProfile -File scripts/audit-secret-surface.ps1

      - name: Release coverage audit
        run: pwsh -NoProfile -File scripts/audit-release-coverage.ps1
