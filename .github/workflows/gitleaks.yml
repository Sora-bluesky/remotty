name: Gitleaks

on:
  push:
    branches:
      - main
      - feature/**
      - codex/**
      - release/**
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
