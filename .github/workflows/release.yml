name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: remotty-windows-x64
            binary: remotty.exe
            renamed: remotty-x64.exe
          - target: aarch64-pc-windows-msvc
            artifact: remotty-windows-arm64
            binary: remotty.exe
            renamed: remotty-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Run public release audits
        shell: pwsh
        run: |
          ./scripts/audit-public-surface.ps1
          ./scripts/audit-doc-terminology.ps1
          ./scripts/audit-secret-surface.ps1

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp remotty-windows-x64/remotty.exe release/remotty-x64.exe
          cp remotty-windows-arm64/remotty.exe release/remotty-arm64.exe
          npm pack --pack-destination release
          cp release/remotty-*.tgz release/remotty.tgz
          cd release && sha256sum *.exe > SHA256SUMS

      - name: Generate release body
        shell: pwsh
        run: ./scripts/generate-release-notes.ps1 -Version "${{ github.ref_name }}" -OutputPath "release/release-body.md"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/release-body.md
          files: release/*

      - name: Publish npm package
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish release/remotty-*.tgz --access public
